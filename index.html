<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Hologram Survival | Sobrevive a la IA</title>
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --cyan: #00f5ff;
      --cyan-dim: #00b8c4;
      --bg: #030408;
      --bg2: #0a1020;
      --text: #c0d8f0;
      --border: #1a2840;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; }

    /* ── START SCREEN ── */
    #start-overlay {
      position: fixed; inset: 0; background: #000; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    #start-overlay h1 { color: #ff003c; letter-spacing: 5px; font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 20px #ff003c; }
    #start-overlay h2 { color: var(--text); font-weight: normal; font-size: 1rem; margin-bottom: 30px; opacity: 0.6; }
    #start-overlay p { opacity: 0.8; margin-bottom: 30px; line-height: 1.6; max-width: 500px; }
    .btn {
      padding: 16px 32px; border: 1px solid var(--cyan); background: rgba(0,245,255,0.1);
      color: var(--cyan); font-family: 'Courier New', monospace; font-size: 1.1rem;
      letter-spacing: 2px; cursor: pointer; border-radius: 4px; transition: all .2s;
    }
    .btn:hover { background: rgba(0,245,255,0.25); box-shadow: 0 0 20px rgba(0,245,255,0.4); }
    .btn.danger { border-color: #ff003c; color: #ff003c; background: rgba(255,0,60,0.1); }
    .btn.danger:hover { background: rgba(255,0,60,0.25); box-shadow: 0 0 20px rgba(255,0,60,0.4); }

    /* ── GAME CANVAS ── */
    #canvas-wrapper { position: absolute; inset: 0; background: #000; }
    #three-canvas { display: block; width: 100%; height: 100%; }
    #video-hidden { display: none; }

    /* ── HUD ── */
    #hud {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      background: rgba(0,0,0,0.6); border: 1px solid var(--border);
      padding: 15px 20px; border-radius: 8px; font-size: 0.85rem;
      backdrop-filter: blur(5px);
    }
    .time-display { font-size: 1.8rem; color: var(--cyan); font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px var(--cyan); }
    .hud-dot { display: inline-block; width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; margin-right: 8px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    
    #game-state-ui { font-weight: bold; margin-top: 8px; font-size: 1rem; }
    .state-alive { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
    .state-dead { color: #ff003c; text-shadow: 0 0 10px #ff003c; }
    .state-build { color: #ffff00; text-shadow: 0 0 5px #ffff00; }

    /* ── GLITCH OVERLAY ── */
    #glitch-overlay {
      position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #ff003c 150%);
      opacity: 0; pointer-events: none; z-index: 100; mix-blend-mode: screen; transition: opacity 0.1s;
    }
    
    /* ── LOADER ── */
    #loading { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .loader { width: 50px; height: 50px; border: 3px solid #333; border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
    @keyframes spin { to { transform: rotate(360deg); } }

    #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
  </style>
</head>
<body>

<!-- START PERMISSION -->
<div id="start-overlay">
  <h1>A.I. SURVIVAL</h1>
  <h2>HOLOGRAM CAMERA</h2>
  <p>
    La IA enemiga atacará tu escáner holográfico en momentos aleatorios.<br><br>
    Sobrevive el mayor tiempo posible mientras ella destruye y reconstruye tu realidad. Conecta tu cámara para entrar a la simulación.
  </p>
  <button id="btn-start-app" class="btn danger">CONECTAR CÁMARA Y JUGAR</button>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <div style="color:var(--cyan); letter-spacing:2px;" id="load-msg">Iniciando redes neuronales...</div>
</div>

<!-- GAME UI -->
<div id="canvas-wrapper">
  <canvas id="three-canvas"></canvas>
  <video id="video-hidden" autoplay playsinline muted></video>
  <div id="glitch-overlay"></div>

  <div id="hud">
    <div class="time-display" id="time-val">0.0s</div>
    <div style="margin-bottom:5px;"><span class="hud-dot" id="rec-dot"></span><span id="fps-val">0</span> FPS</div>
    <div id="game-state-ui" class="state-alive">SISTEMA ESTABLE</div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-flip-cam">🔄 CAMBIAR LENTE</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.3/dist/depth-estimation.min.js"></script>
<script src="app.js"></script>

</body>
</html>
